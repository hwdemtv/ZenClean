# ZenClean Nginx 安全响应头配置
# 部署位置：宝塔面板 -> 网站 -> 设置 -> 配置文件
# 将以下配置添加到 server {} 块内

# ==================== 安全响应头 ====================

# 防止 MIME 类型嗅探
add_header X-Content-Type-Options "nosniff" always;

# 防止点击劫持
add_header X-Frame-Options "SAMEORIGIN" always;

# XSS 防护
add_header X-XSS-Protection "1; mode=block" always;

# 引用策略
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 权限策略
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ==================== 可选：HSTS (需启用 HTTPS) ====================
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ==================== 可选：CSP (内容安全策略) ====================
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;

# ==================== 静态资源缓存 ====================

# 图片缓存 1 年
location ~* \.(png|jpg|jpeg|gif|ico|webp|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# 字体缓存 1 年
location ~* \.(woff2?|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# CSS/JS 缓存 1 个月
location ~* \.(css|js)$ {
    expires 1M;
    add_header Cache-Control "public";
}

# HTML 不缓存
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# ==================== Gzip 压缩 ====================

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# ==================== 部署说明 ====================
# 1. 登录宝塔面板
# 2. 进入【网站】-> 找到 zenclean.hwdemtv.com -> 点击【设置】
# 3. 选择【配置文件】
# 4. 将上述安全头配置粘贴到 server {} 块内的顶部
# 5. 点击【保存】
# 6. 点击【重载配置】使更改生效

# ==================== 验证方式 ====================
# 使用 curl 验证安全头是否生效：
# curl -I https://zenclean.hwdemtv.com
# 或使用在线工具：https://securityheaders.com
